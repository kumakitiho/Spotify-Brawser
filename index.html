<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Spotify Stats</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #121212;
        }
        .bg-spotify-green { background-color: #1DB954; }
        .text-spotify-green { color: #1DB954; }
        .bg-spotify-dark { background-color: #121212; }
        .bg-spotify-light-dark { background-color: #181818; }
        .bg-spotify-gray { background-color: #282828; }
        .text-spotify-light-gray { color: #b3b3b3; }
        .filter-btn { transition: background-color 0.2s ease-in-out, color 0.2s ease-in-out; }
        .type-filter-btn.active { background-color: #1DB954; color: #121212; }
        .period-filter-btn.active, .year-filter-btn.active { 
            background-color: #fff !important; 
            color: #121212 !important; 
        }
        .period-filter-btn:not(.active), .year-filter-btn:not(.active) { 
            background-color: #282828 !important; 
            color: #ffffff !important; 
        }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #1DB954; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 2rem auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* レスポンシブ対応 - アーティスト写真クラウド */
        @media (max-width: 768px) {
            #artist-view-toggle {
                flex-direction: column;
                gap: 0.5rem;
            }
            .view-toggle-btn {
                font-size: 0.75rem;
                padding: 0.5rem 1rem;
            }
            #artist-cloud {
                min-height: 45rem; /* 縦長ダイヤモンド配置により高く */
                padding: 1rem;
            }
        }
        
        @media (max-width: 480px) {
            #artist-cloud {
                min-height: 40rem; /* スマホでも縦長を確保 */
                padding: 0.5rem;
            }
        }
        
        /* アーティスト写真クラウド - 動的グラデーションとネオンエフェクト */
        #artist-cloud {
            background: linear-gradient(-45deg, #121212, #1a1a2e, #16213e, #0f3460, #1DB954);
            background-size: 400% 400%;
            animation: dynamicGradient 15s ease infinite;
            position: relative;
            overflow: hidden;
        }
        
        #artist-cloud::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(29, 185, 84, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(30, 215, 96, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 40% 80%, rgba(29, 185, 84, 0.05) 0%, transparent 50%);
            animation: pulseLight 8s ease-in-out infinite alternate;
        }
        
        @keyframes dynamicGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        @keyframes pulseLight {
            0% { opacity: 0.3; }
            100% { opacity: 0.7; }
        }
        
        /* アーティスト写真のネオンエフェクト */
        .artist-photo {
            position: relative;
            filter: drop-shadow(0 0 20px rgba(29, 185, 84, 0.3));
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .artist-photo::before {
            content: '';
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #1DB954, #1ed760, #1fdf64, #1DB954);
            z-index: -1;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        
        .artist-photo:hover {
            filter: drop-shadow(0 0 30px rgba(29, 185, 84, 0.6)) 
                    drop-shadow(0 0 60px rgba(29, 185, 84, 0.4));
            transform: scale(1.1);
        }
        
        .artist-photo:hover::before {
            opacity: 0.8;
            animation: rotateGlow 2s linear infinite;
        }
        
        @keyframes rotateGlow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* 人気度別のエフェクト */
        .artist-rank-1 { 
            filter: drop-shadow(0 0 25px rgba(255, 215, 0, 0.4)) 
                    drop-shadow(0 0 50px rgba(29, 185, 84, 0.3)); 
        }
        .artist-rank-2 { 
            filter: drop-shadow(0 0 20px rgba(192, 192, 192, 0.4)) 
                    drop-shadow(0 0 40px rgba(29, 185, 84, 0.3)); 
        }
        .artist-rank-3 { 
            filter: drop-shadow(0 0 18px rgba(205, 127, 50, 0.4)) 
                    drop-shadow(0 0 35px rgba(29, 185, 84, 0.3)); 
        }
        
        /* 色滲み出しエフェクト */
        .artist-photo:hover {
            box-shadow: 0 0 0 0 rgba(29, 185, 84, 0.7);
            animation: colorBleed 1.5s infinite;
        }
        
        /* ホバー時にツールチップを最前面に */
        .group:hover {
            z-index: 9998 !important;
        }
        
        @keyframes colorBleed {
            0% {
                box-shadow: 0 0 0 0 rgba(29, 185, 84, 0.7);
            }
            70% {
                box-shadow: 0 0 0 30px rgba(29, 185, 84, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(29, 185, 84, 0);
            }
        }
    </style>
</head>
<body class="bg-spotify-dark text-white">

    <div id="app-container" class="p-4 md:p-8 max-w-4xl mx-auto">
        <div id="login-view" class="text-center py-20">
            <h1 class="text-4xl md:text-6xl font-bold mb-4">あなたのSpotify統計</h1>
            <p class="text-spotify-light-gray mb-8">あなたの再生履歴とランキングを、まとめて見てみよう。</p>
            <button id="login-button" class="bg-spotify-green text-black font-bold py-3 px-8 rounded-full text-lg hover:scale-105 transition-transform">
                Spotifyでログイン
            </button>
        </div>
        <div id="main-view" class="hidden">
            <header class="flex justify-between items-center mb-8">
                <h1 class="text-3xl font-bold">My Stats</h1>
                <div id="user-profile" class="flex items-center gap-3">
                    <span id="user-name" class="hidden sm:inline"></span>
                    <img id="user-avatar" src="https://placehold.co/40x40/282828/FFFFFF?text=U" class="rounded-full" alt="ユーザーアイコン">
                </div>
            </header>
            <main>
                <div class="flex gap-4 mb-6">
                    <button class="type-filter-btn filter-btn active bg-spotify-gray text-white font-bold py-2 px-4 rounded-full text-sm" data-type="tracks">トップ楽曲</button>

                </div>
                <div class="flex flex-wrap gap-3 mb-8">
                    <button class="period-filter-btn filter-btn active bg-white text-black font-semibold py-1 px-3 rounded-md text-xs" data-range="medium_term">過去6ヶ月</button>
                    <button class="period-filter-btn filter-btn bg-spotify-gray text-white font-semibold py-1 px-3 rounded-md text-xs" data-range="short_term">最近4週間</button>
                    <button class="period-filter-btn filter-btn bg-spotify-gray text-white font-semibold py-1 px-3 rounded-md text-xs" data-range="long_term">全期間</button>
                    <span class="text-spotify-light-gray self-center mx-2">|</span>
                    <button class="year-filter-btn filter-btn bg-spotify-gray text-white font-semibold py-1 px-3 rounded-md text-xs" data-range="2024">2024年</button>
                    <button class="year-filter-btn filter-btn bg-spotify-gray text-white font-semibold py-1 px-3 rounded-md text-xs" data-range="2023">2023年</button>
                    <button class="year-filter-btn filter-btn bg-spotify-gray text-white font-semibold py-1 px-3 rounded-md text-xs" data-range="2022">2022年</button>
                </div>
                
                <!-- アーティスト表示切り替え（アーティスト選択時のみ表示） -->
                <div id="artist-view-toggle" class="flex gap-2 mb-6" style="display: none;">
                    <button id="artist-list-view" class="view-toggle-btn bg-spotify-green text-black font-semibold py-2 px-4 rounded-full text-sm transition-all hover:scale-105">
                        <svg class="w-4 h-4 inline mr-1" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M3 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 16a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z"/>
                        </svg>
                        リスト表示
                    </button>
                    <button id="artist-cloud-view" class="view-toggle-btn bg-spotify-gray text-white font-semibold py-2 px-4 rounded-full text-sm transition-all hover:scale-105">
                        <svg class="w-4 h-4 inline mr-1" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M4 3a2 2 0 100 4h12a2 2 0 100-4H4zM4 9a2 2 0 100 4h12a2 2 0 100-4H4zM4 15a2 2 0 100 4h12a2 2 0 100-4H4z"/>
                        </svg>
                        イメージクラウド
                    </button>
                    <button id="artist-genre-view" class="view-toggle-btn bg-spotify-gray text-white font-semibold py-2 px-4 rounded-full text-sm transition-all hover:scale-105">
                        <svg class="w-4 h-4 inline mr-1" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M7 3a1 1 0 000 2h6a1 1 0 100-2H7zM4 7a1 1 0 011-1h10a1 1 0 110 2H5a1 1 0 01-1-1zM2 11a2 2 0 012-2h12a2 2 0 012 2v4a2 2 0 01-2 2H4a2 2 0 01-2-2v-4z"/>
                        </svg>
                        ジャンルクラウド
                    </button>
                </div>
                
                <div id="ranking-list"></div>
                <div id="artist-cloud" class="relative w-full min-h-96 rounded-lg p-8" style="display: none;"></div>
                <div id="genre-cloud" class="relative w-full min-h-96 rounded-lg p-8" style="display: none;"></div>
            </main>
            
            <!-- 再生コントロールバー -->
            <div id="playback-control" class="fixed bottom-0 left-0 right-0 bg-black bg-opacity-95 backdrop-blur-sm border-t border-gray-700 p-4 hidden z-50">
                <div class="max-w-6xl mx-auto flex items-center justify-between">
                    <div class="flex items-center flex-1 min-w-0">
                        <img id="current-track-image" src="" class="w-12 h-12 rounded-md mr-4" alt="現在の楽曲">
                        <div class="min-w-0 flex-1">
                            <div id="current-track-name" class="font-semibold truncate text-white">楽曲名</div>
                            <div id="current-track-artist" class="text-sm text-spotify-light-gray truncate">アーティスト名</div>
                        </div>
                    </div>
                    
                    <div class="flex items-center space-x-4">
                        <button id="play-pause-btn" class="p-2 rounded-full bg-white text-black hover:scale-110 transition-transform">
                            <svg id="pause-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"/>
                            </svg>
                            <svg id="play-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" class="hidden">
                                <path d="M8 5v14l11-7z"/>
                            </svg>
                        </button>
                    </div>
                    
                    <div class="flex items-center space-x-2 flex-1 justify-end">
                        <span id="current-time" class="text-sm text-spotify-light-gray">0:00</span>
                        <div id="seek-bar" class="w-32 bg-gray-600 rounded-full h-1 cursor-pointer hover:h-2 transition-all relative">
                            <div id="progress-bar" class="bg-white h-full rounded-full transition-all pointer-events-none" style="width: 0%"></div>
                        </div>
                        <span id="total-time" class="text-sm text-spotify-light-gray">0:00</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <audio id="audio-player"></audio>
    <script src="https://sdk.scdn.co/spotify-player.js"></script>

    <script>
        // --- �ݒ� ---
        const { CLIENT_ID, REDIRECT_URI, SCOPES, TOKEN_ENDPOINT, AUTH_URL } = window.appConfig;

        // --- DOM�v�f ---
        const loginView = document.getElementById('login-view');
        const mainView = document.getElementById('main-view');
        const loginButton = document.getElementById('login-button');
        const rankingList = document.getElementById('ranking-list');
        const userProfile = { name: document.getElementById('user-name'), avatar: document.getElementById('user-avatar') };
        const audioPlayer = document.getElementById('audio-player');
        
        // 再生コントロール要素
        const playbackControl = document.getElementById('playback-control');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const currentTrackImage = document.getElementById('current-track-image');
        const currentTrackName = document.getElementById('current-track-name');
        const currentTrackArtist = document.getElementById('current-track-artist');
        const currentTime = document.getElementById('current-time');
        const totalTime = document.getElementById('total-time');
        const progressBar = document.getElementById('progress-bar');
        const seekBar = document.getElementById('seek-bar');

        // --- �O���[�o���ϐ� ---
        let accessToken = null;
        let currentTrackUrl = null;
        let player = null;
        let deviceId = null;
        let isPlaying = false;
        let currentTrackInfo = null;
        let progressInterval = null;
        let currentPlayingTrackUri = null;

        // --- PKCE Helper Functions ---
        const generateRandomString = (length) => {
            const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            const values = crypto.getRandomValues(new Uint8Array(length));
            return values.reduce((acc, x) => acc + possible[x % possible.length], "");
        };

        const sha256 = async (plain) => {
            const encoder = new TextEncoder();
            const data = encoder.encode(plain);
            return window.crypto.subtle.digest('SHA-256', data);
        };

        const base64encode = (input) => {
            return btoa(String.fromCharCode(...new Uint8Array(input)))
                .replace(/=/g, '')
                .replace(/\+/g, '-')
                .replace(/\//g, '_');
        };

        // --- �F�؃t���[ ---
        loginButton.addEventListener('click', async () => {
            const codeVerifier = generateRandomString(64);
            window.localStorage.setItem('code_verifier', codeVerifier);

            const hashed = await sha256(codeVerifier);
            const codeChallenge = base64encode(hashed);

            const params = new URLSearchParams({
                client_id: CLIENT_ID,
                response_type: 'code',
                redirect_uri: REDIRECT_URI,
                scope: SCOPES,
                code_challenge_method: 'S256',
                code_challenge: codeChallenge,
            });
            window.location.href = `${AUTH_URL}?${params.toString()}`;
        });

        // ������ �f�o�b�O������ ������
        const getToken = async (code) => {
            const codeVerifier = localStorage.getItem('code_verifier');
            
            try {
                const response = await fetch(TOKEN_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        client_id: CLIENT_ID,
                        grant_type: 'authorization_code',
                        code: code,
                        redirect_uri: REDIRECT_URI,
                        code_verifier: codeVerifier,
                    }),
                });

                if (!response.ok) {
                    // �G���[���X�|���X�̓��e���R���\�[���ɕ\��
                    const errorData = await response.json();
                    console.error('--- Spotify API Error ---');
                    console.error('Status:', response.status);
                    console.error('Error Body:', errorData);
                    console.error('-------------------------');
                    return null;
                }

                const data = await response.json();
                return data.access_token;

            } catch (error) {
                console.error('--- Network Error ---');
                console.error('Failed to fetch token:', error);
                console.error('---------------------');
                return null;
            }
        };

        // --- ���������� ---
        window.addEventListener('load', async () => {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');

            if (code) {
                const url = new URL(window.location.href);
                url.searchParams.delete('code');
                window.history.replaceState({}, document.title, url);
                
                accessToken = await getToken(code);
                if (accessToken) {
                    initializeApp();
                } else {
                    loginView.classList.remove('hidden');
                    mainView.classList.add('hidden');
                }
            }
        });

        // --- �A�v���P�[�V�����̃��C������ ---
        async function initializeApp() {
            loginView.classList.add('hidden');
            mainView.classList.remove('hidden');
            await fetchUserProfile();
            await initializeSpotifyPlayer();
            setupEventListeners();
            fetchAndDisplayData();
        }
        
        // --- Spotify Web Playback SDK初期化 ---
        async function initializeSpotifyPlayer() {
            console.log('Spotify Web Playback SDKを初期化中...');
            
            // SDKが既に読み込まれている場合は即座に初期化
            if (window.Spotify) {
                initializePlayer();
            } else {
                // SDKの読み込みを待つ
                window.onSpotifyWebPlaybackSDKReady = initializePlayer;
            }
        }
        
        function initializePlayer() {
            console.log('プレイヤーを作成中...');
            player = new Spotify.Player({
                name: 'Music App Player',
                getOAuthToken: cb => { cb(accessToken); },
                volume: 0.5
            });

            // エラーハンドリング
            player.addListener('initialization_error', ({ message }) => {
                console.error('初期化エラー:', message);
            });

            player.addListener('authentication_error', ({ message }) => {
                console.error('認証エラー:', message);
            });

            player.addListener('account_error', ({ message }) => {
                console.error('アカウントエラー (プレミアム必須):', message);
            });

            player.addListener('playback_error', ({ message }) => {
                console.error('再生エラー:', message);
            });

            // プレイヤー準備完了
            player.addListener('ready', ({ device_id }) => {
                console.log('🎵 プレイヤー準備完了! Device ID:', device_id);
                deviceId = device_id;
            });

            player.addListener('not_ready', ({ device_id }) => {
                console.log('プレイヤーが利用できません Device ID:', device_id);
            });

            // 再生状態の変更を監視
            player.addListener('player_state_changed', state => {
                if (!state) {
                    hidePlaybackControl();
                    return;
                }

                const {
                    current_track,
                    position,
                    duration,
                    paused
                } = state;

                // デバッグ: player_state_changedで取得される楽曲情報
                console.log('🔄 player_state_changed - 楽曲情報:', {
                    name: current_track?.name,
                    artists: current_track?.artists?.map(a => a.name).join(', '),
                    uri: current_track?.uri,
                    paused: paused
                });

                updatePlaybackControl({
                    track: current_track,
                    position,
                    duration,
                    paused
                });

                isPlaying = !paused;
                updatePlayPauseButton();
                
                // リアルタイム更新の管理
                if (isPlaying) {
                    startProgressUpdate();
                } else {
                    stopProgressUpdate();
                }
            });

            // プレイヤーに接続
            player.connect().then(success => {
                if (success) {
                    console.log('✅ Spotify Playerに正常に接続しました!');
                    setupPlaybackControls();
                } else {
                    console.error('❌ Spotify Playerへの接続に失敗しました');
                }
            });
        }
        
        async function fetchUserProfile() {
            const data = await apiRequest('https://api.spotify.com/v1/me');
            if (data) {
                userProfile.name.textContent = data.display_name;
                if (data.images && data.images.length > 0) {
                    userProfile.avatar.src = data.images[0].url;
                }
            }
        }

        function setupEventListeners() {
            document.querySelectorAll('.type-filter-btn').forEach(button => {
                button.addEventListener('click', (e) => {
                    document.querySelectorAll('.type-filter-btn').forEach(btn => btn.classList.remove('active'));
                    e.target.classList.add('active');
                    
                    // アーティスト選択時のみビュー切り替えボタンを表示
                    const artistViewToggle = document.getElementById('artist-view-toggle');
                    if (e.target.dataset.type === 'artists') {
                        artistViewToggle.style.display = 'flex';
                    } else {
                        artistViewToggle.style.display = 'none';
                        // トラック表示時はリスト表示に戻す
                        showListView();
                    }
                    
                    fetchAndDisplayData();
                });
            });
            // ボタン状態をリセットする共通関数
            function resetAllRangeButtons() {
                document.querySelectorAll('.period-filter-btn, .year-filter-btn').forEach(btn => {
                    btn.classList.remove('active');
                });
            }
            
            // 期間フィルター（過去6ヶ月、4週間、全期間）
            document.querySelectorAll('.period-filter-btn').forEach(button => {
                button.addEventListener('click', (e) => {
                    console.log('🔍 期間ボタンクリック:', e.target.textContent);
                    resetAllRangeButtons();
                    e.target.classList.add('active');
                    console.log('✅ 期間ボタンアクティブ化完了');
                    fetchAndDisplayData();
                });
            });
            
            // 年別フィルター（2024年、2023年、2022年）
            document.querySelectorAll('.year-filter-btn').forEach(button => {
                button.addEventListener('click', (e) => {
                    console.log('🔍 年別ボタンクリック:', e.target.textContent);
                    resetAllRangeButtons();
                    e.target.classList.add('active');
                    console.log('✅ 年別ボタンアクティブ化完了');
                    fetchAndDisplayData();
                });
            });
            
            // ビュー切り替えボタンのイベントリスナー
            document.getElementById('artist-list-view').addEventListener('click', showListView);
            document.getElementById('artist-cloud-view').addEventListener('click', showCloudView);
            document.getElementById('artist-genre-view').addEventListener('click', showGenreView);
        }

        // --- �f�[�^�擾�ƕ\�� ---
        async function fetchAndDisplayData() {
            showLoader();
            const type = document.querySelector('.type-filter-btn.active').dataset.type;
            
            // アクティブな期間ボタンまたは年別ボタンを取得
            const activePeriodBtn = document.querySelector('.period-filter-btn.active');
            const activeYearBtn = document.querySelector('.year-filter-btn.active');
            const range = activePeriodBtn?.dataset.range || activeYearBtn?.dataset.range;
            
            if (!isNaN(parseInt(range))) {
                // Get long_term data from Spotify API with limit=50
                const data = await apiRequest(`https://api.spotify.com/v1/me/top/${type}?time_range=long_term&limit=50`);
                
                if (data && data.items && type === 'tracks') {
                    console.log('年別フィルター用の楽曲データサンプル:', data.items[0]);
                }

        function generateCloudPositions(count, sizes = []) {
            const positions = [];
            const centerX = 50;
            const centerY = 50;
            const isMobile = window.innerWidth <= 768;
            const containerWidth = isMobile ? window.innerWidth : 800;
            
            // 重なり検出関数
            function isOverlapping(pos1, size1, pos2, size2) {
                const radius1 = (size1 / 2) / containerWidth * 100; // %単位の半径
                const radius2 = (size2 / 2) / containerWidth * 100;
                const distance = Math.sqrt(Math.pow(pos1.x - pos2.x, 2) + Math.pow(pos1.y - pos2.y, 2));
                return distance < (radius1 + radius2 + 1); // 1%のマージン追加
            }
            
            // 位置調整関数
            function adjustPosition(baseX, baseY, currentSize, existingPositions, maxAttempts = 20) {
                let bestPos = { x: baseX, y: baseY };
                let minOverlaps = Infinity;
                
                for (let attempt = 0; attempt < maxAttempts; attempt++) {
                    const angle = (Math.PI * 2 * attempt) / maxAttempts;
                    const adjustDistance = attempt * 0.5; // 徐々に距離を広げる
                    
                    const testX = baseX + Math.cos(angle) * adjustDistance;
                    const testY = baseY + Math.sin(angle) * adjustDistance;
                    
                    // 境界チェック
                    const margin = 3;
                    if (testX < margin || testX > 100 - margin || testY < margin || testY > 100 - margin) {
                        continue;
                    }
                    
                    // 重なり数をカウント
                    let overlaps = 0;
                    for (let j = 0; j < existingPositions.length; j++) {
                        if (isOverlapping({ x: testX, y: testY }, currentSize, existingPositions[j].pos, existingPositions[j].size)) {
                            overlaps++;
                        }
                    }
                    
                    if (overlaps < minOverlaps) {
                        minOverlaps = overlaps;
                        bestPos = { x: testX, y: testY };
                        if (overlaps === 0) break; // 重なりなしなら完了
                    }
                }
                
                return bestPos;
            }
            
            const placedPhotos = [];
            
            for (let i = 0; i < count; i++) {
                const currentSize = sizes[i] || 64;
                let x, y;
                
                if (i === 0) {
                    // 1位は中央
                    x = centerX;
                    y = centerY;
                } else {
                    // 理想的な同心円位置を計算
                    let ring, positionInRing, itemsInRing;
                    
                    if (i >= 1 && i <= 6) {
                        ring = 1; positionInRing = i - 1; itemsInRing = 6;
                    } else if (i >= 7 && i <= 18) {
                        ring = 2; positionInRing = i - 7; itemsInRing = 12;
                    } else if (i >= 19 && i <= 36) {
                        ring = 3; positionInRing = i - 19; itemsInRing = 18;
                    } else {
                        ring = 4 + Math.floor((i - 37) / 24);
                        positionInRing = (i - 37) % 24;
                        itemsInRing = 24;
                    }
                    
                    const angle = (2 * Math.PI * positionInRing) / itemsInRing - Math.PI / 2;
                    
                    // 重なりを防ぐ適切な半径計算
                    const avgPhotoSize = sizes.reduce((a, b) => a + b, 0) / sizes.length || 64;
                    const minRadius = (avgPhotoSize * 1.2) / containerWidth * 100; // 最小間隔
                    
                    const baseRadius = Math.max(minRadius, (isMobile ? 12 : 15) * ring);
                    const idealX = centerX + Math.cos(angle) * baseRadius;
                    const idealY = centerY + Math.sin(angle) * baseRadius;
                    
                    // 重なり回避調整
                    const adjustedPos = adjustPosition(idealX, idealY, currentSize, placedPhotos);
                    x = adjustedPos.x;
                    y = adjustedPos.y;
                }
                
                positions.push({ x, y });
                placedPhotos.push({ pos: { x, y }, size: currentSize });
            }
            
            console.log('🎯 重なり防止配置完了:', {
                count,
                overlaps: placedPhotos.length > 1 ? placedPhotos.filter((p1, i) => 
                    placedPhotos.some((p2, j) => i !== j && isOverlapping(p1.pos, p1.size, p2.pos, p2.size))
                ).length : 0
            });
            
            return positions;
        }
        
        // ジャンルクラウド専用の配置アルゴリズム
        function generateGenreCloudPositions(count) {
            const positions = [];
            const centerX = 50;
            const centerY = 50;
            
            for (let i = 0; i < count; i++) {
                let x, y;
                
                if (i === 0) {
                    // 最も人気のジャンルは中央
                    x = centerX;
                    y = centerY;
                } else {
                    // ランダム配置だが重なりを避ける
                    let attempts = 0;
                    do {
                        const angle = Math.random() * 2 * Math.PI;
                        const radius = Math.sqrt(Math.random()) * 35 + 10; // 10-45%の半径
                        
                        x = centerX + Math.cos(angle) * radius;
                        y = centerY + Math.sin(angle) * radius;
                        
                        // 境界チェック
                        x = Math.max(10, Math.min(90, x));
                        y = Math.max(10, Math.min(90, y));
                        
                        attempts++;
                    } while (attempts < 50 && positions.some(pos => 
                        Math.sqrt(Math.pow(pos.x - x, 2) + Math.pow(pos.y - y, 2)) < 8
                    ));
                }
                
                positions.push({ x, y });
            }
            
            console.log('🎨 ジャンルクラウド配置完了:', positions.slice(0, 5));
            return positions;
        }
        
        // グローバルツールチップシステム
        let globalTooltip = null;
        
        function showTooltip(targetElement, text, artist) {

            globalTooltip.className = 'fixed bg-gradient-to-r from-transparent via-black to-transparent bg-opacity-95 text-white text-xs px-3 py-2 rounded-full backdrop-blur-sm border border-spotify-green/30 pointer-events-none transition-all duration-300 whitespace-nowrap';
            globalTooltip.style.zIndex = '2147483647'; // 最大値
            globalTooltip.innerHTML = `<span class="text-spotify-green font-bold">${text.split(' ')[0]}</span> ${text.split(' ').slice(1).join(' ')}`;
            
            document.body.appendChild(globalTooltip);
            
            // 位置計算
            const rect = targetElement.getBoundingClientRect();
            const tooltipRect = globalTooltip.getBoundingClientRect();
            
            const left = rect.left + rect.width / 2 - tooltipRect.width / 2;
            const top = rect.bottom + 8; // 写真の下8px
            
            globalTooltip.style.left = Math.max(8, Math.min(window.innerWidth - tooltipRect.width - 8, left)) + 'px';
            globalTooltip.style.top = top + 'px';
            globalTooltip.style.opacity = '1';

        function addPlayButtonListeners() {
            document.querySelectorAll('.play-btn').forEach(button => {
                button.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    
                    // ボタン要素からデータを取得（クリックされた要素がSVGでも対応）
                    const buttonElement = e.target.closest('.play-btn');
                    if (!buttonElement) return;
                    
                    const previewUrl = buttonElement.dataset.previewUrl;
                    const trackUri = buttonElement.dataset.trackUri;
                    
                    if (previewUrl) {
                        // プレビュー音源がある場合は従来通りの再生
                        console.log('プレビュー再生中:', previewUrl);
                        if (audioPlayer.paused || currentTrackUrl !== previewUrl) {
                            audioPlayer.src = previewUrl;
                            audioPlayer.play().then(() => {
                                currentTrackUrl = previewUrl;
                                console.log('プレビュー再生開始');
                            }).catch(error => {
                                console.error('プレビュー再生エラー:', error);
                            });
                        } else {
                            audioPlayer.pause();
                            console.log('プレビュー再生停止');
                        }
                    } else {
                        // Web Playback SDKでフル再生を試行
                        if (trackUri && deviceId) {
                            console.log('Web Playback SDKでフル再生:', trackUri);
                            
                            // 楽曲情報を取得
                            const trackRow = buttonElement.parentElement.parentElement;
                            const trackInfo = {
                                name: trackRow.querySelector('.font-semibold.truncate')?.textContent || '不明な楽曲',
                                artist: trackRow.querySelector('.text-sm.text-spotify-light-gray.truncate')?.textContent || '不明なアーティスト',
                                image: trackRow.querySelector('img')?.src || ''
                            };
                            
                            playTrackWithWebPlayback(trackUri, trackInfo);
                        } else if (trackUri) {
                            // デバイスが準備できていない場合は外部リンク
                            const spotifyUrl = trackUri.replace('spotify:track:', 'https://open.spotify.com/track/');
                            console.log('デバイス未準備、Spotifyで開く:', spotifyUrl);
                            window.open(spotifyUrl, '_blank');
                        } else {
                            alert('この楽曲の情報が取得できませんでした。');
                        }
                    }
                });
            });
        }
        
        // --- Web Playback SDK再生機能 ---
        async function playTrackWithWebPlayback(trackUri, trackInfo = null) {
            console.log('🎵 playTrackWithWebPlayback呼び出し:', { trackUri, trackInfo });
            
            if (!deviceId || !accessToken) {
                console.error('デバイスIDまたはアクセストークンが利用できません');
                return;
            }
            
            try {
                // 再生APIでトラックを開始
                const response = await fetch(`https://api.spotify.com/v1/me/player/play?device_id=${deviceId}`, {
                    method: 'PUT',
                    body: JSON.stringify({ uris: [trackUri] }),
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${accessToken}`
                    },
                });

                if (response.ok) {
                    console.log('✅ Web Playback SDKで再生開始!');
                    
                    // 楽曲情報を即座に設定
                    if (trackInfo) {
                        currentTrackName.textContent = trackInfo.name;
                        currentTrackArtist.textContent = trackInfo.artist;
                        currentTrackImage.src = trackInfo.image;
                        showPlaybackControl();
                        
                        console.log('⚡ 楽曲情報を即座に設定:', trackInfo);
                    } else {
                        // フォールバック: DOM から取得
                        setInitialTrackInfo(trackUri);
                    }
                } else if (response.status === 404) {
                    console.warn('デバイスが見つかりません。外部リンクで開きます。');
                    const spotifyUrl = trackUri.replace('spotify:track:', 'https://open.spotify.com/track/');
                    window.open(spotifyUrl, '_blank');
                } else {
                    const error = await response.text();
                    console.error('再生リクエストエラー:', response.status, error);
                    
                    // フォールバックで外部リンク
                    const spotifyUrl = trackUri.replace('spotify:track:', 'https://open.spotify.com/track/');
                    window.open(spotifyUrl, '_blank');
                }
            } catch (error) {
                console.error('Web Playback再生エラー:', error);
                
                // フォールバックで外部リンク
                const spotifyUrl = trackUri.replace('spotify:track:', 'https://open.spotify.com/track/');
                window.open(spotifyUrl, '_blank');
            }
        }
        
        // --- 再生コントロール機能 ---
        function setupPlaybackControls() {
            playPauseBtn.addEventListener('click', togglePlayback);
            seekBar.addEventListener('click', handleSeek);
        }
        
        async function togglePlayback() {
            if (!player) return;
            
            if (isPlaying) {
                await player.pause();
            } else {
                await player.resume();
            }
        }
        
        async function handleSeek(event) {
            if (!player || !accessToken || !deviceId) return;
            
            try {
                const state = await player.getCurrentState();
                if (!state || !state.duration) return;
                
                // クリック位置から再生位置を計算
                const rect = seekBar.getBoundingClientRect();
                const clickX = event.clientX - rect.left;
                const percentage = clickX / rect.width;
                const seekPosition = Math.floor(state.duration * percentage);
                
                console.log(`シーク: ${percentage * 100}% (${formatTime(seekPosition)})`);
                
                // Spotify APIでシーク
                const response = await fetch(`https://api.spotify.com/v1/me/player/seek?position_ms=${seekPosition}&device_id=${deviceId}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`
                    }
                });
                
                if (response.ok) {
                    console.log('✅ シーク成功');
                } else {
                    console.error('❌ シーク失敗:', response.status);
                }
            } catch (error) {
                console.error('シークエラー:', error);
            }
        }
        
        function updatePlaybackControl({ track, position, duration, paused }) {
            if (!track) return;
            
            // 楽曲情報の更新（楽曲情報が有効な場合のみ）
            if (track.name && track.artists && track.artists.length > 0) {
                currentTrackName.textContent = track.name;
                currentTrackArtist.textContent = track.artists.map(artist => artist.name).join(', ');
                
                if (track.album && track.album.images && track.album.images.length > 0) {
                    currentTrackImage.src = track.album.images[0].url;
                }
                
                console.log('✅ 楽曲情報を正常に更新:', {
                    name: track.name,
                    artists: track.artists.map(artist => artist.name).join(', ')
                });
            } else {
                console.warn('⚠️ 楽曲情報が不完全なため更新をスキップ:', {
                    name: track.name,
                    artists: track.artists,
                    uri: track.uri
                });
            }
            
            // 現在再生中の楽曲URIを追跡
            if (track.uri && currentPlayingTrackUri !== track.uri) {
                currentPlayingTrackUri = track.uri;
                console.log('再生中楽曲URI更新:', track.uri);
                // ボタン状態を更新
                updateTrackButtonStates();
            }
            
            // 再生時間の更新
            currentTime.textContent = formatTime(position);
            totalTime.textContent = formatTime(duration);
            
            // プログレスバーの更新
            const progress = (position / duration) * 100;
            progressBar.style.width = `${progress}%`;
            
            // コントロールバーを表示
            showPlaybackControl();
        }
        
        function updatePlayPauseButton() {
            if (isPlaying) {
                playIcon.classList.add('hidden');
                pauseIcon.classList.remove('hidden');
            } else {
                playIcon.classList.remove('hidden');
                pauseIcon.classList.add('hidden');
            }
        }
        
        function showPlaybackControl() {
            playbackControl.classList.remove('hidden');
        }
        
        function hidePlaybackControl() {
            playbackControl.classList.add('hidden');
            stopProgressUpdate();
            currentPlayingTrackUri = null;
            console.log('再生中楽曲URI をクリア');
        }
        
        function updateTrackButtonStates() {
            console.log('ボタン状態更新:', { currentPlayingTrackUri, isPlaying });
            
            // 全ての再生ボタンを更新
            const playButtons = document.querySelectorAll('.play-btn');
            console.log('見つかった再生ボタン数:', playButtons.length);
            
            playButtons.forEach((button, index) => {
                const trackUri = button.dataset.trackUri;
                const svgElement = button.querySelector('svg path');
                
                if (!svgElement) {
                    console.warn(`ボタン${index}: SVGパスが見つかりません`);
                    return;
                }
                
                if (trackUri === currentPlayingTrackUri && isPlaying) {
                    // 再生中: 停止アイコンに変更
                    svgElement.setAttribute('d', 'M6 4h4v16H6V4zm8 0h4v16h-4V4z');
                    button.title = '停止';
                    button.classList.add('playing');
                    console.log(`ボタン${index}: 停止アイコンに変更`);
                } else {
                    // 停止中または他の楽曲: 再生アイコン
                    svgElement.setAttribute('d', 'M8 5v14l11-7z');
                    button.title = trackUri === currentPlayingTrackUri ? '再生' : 'Spotifyで再生';
                    button.classList.remove('playing');
                    console.log(`ボタン${index}: 再生アイコンに変更`);
                }
            });
        }
        
        function formatTime(ms) {
            const seconds = Math.floor(ms / 1000);
            const minutes = Math.floor(seconds / 60);
            const remainingSeconds = seconds % 60;
            return `${minutes}:${remainingSeconds.toString().padStart(2, '0')}`;
        }
        
        function startProgressUpdate() {
            stopProgressUpdate(); // 既存のインターバルをクリア
            
            progressInterval = setInterval(async () => {
                if (!player) return;
                
                try {
                    const state = await player.getCurrentState();
                    if (state && state.position && state.duration) {
                        // リアルタイムで時間とプログレスバーを更新
                        currentTime.textContent = formatTime(state.position);
                        totalTime.textContent = formatTime(state.duration);
                        
                        const progress = (state.position / state.duration) * 100;
                        progressBar.style.width = `${Math.min(progress, 100)}%`;
                    }
                } catch (error) {
                    console.error('プログレス更新エラー:', error);
                }
            }, 1000); // 1秒ごとに更新
        }
        
        function stopProgressUpdate() {
            if (progressInterval) {
                clearInterval(progressInterval);
                progressInterval = null;
            }
        }
        
        function setInitialTrackInfo(trackUri) {
            // 現在表示されている楽曲リストから情報を取得
            const playButtons = document.querySelectorAll('.play-btn');
            for (const button of playButtons) {
                if (button.dataset.trackUri === trackUri) {
                    // 親要素（楽曲の行全体）を取得
                    const trackRow = button.parentElement.parentElement;
                    
                    // 楽曲情報を取得
                    const trackNameElement = trackRow.querySelector('.font-semibold.truncate');
                    const artistNameElement = trackRow.querySelector('.text-sm.text-spotify-light-gray.truncate');
                    const imageElement = trackRow.querySelector('img');
                    
                    if (trackNameElement && artistNameElement && imageElement) {
                        // コントロールバーに情報を設定
                        currentTrackName.textContent = trackNameElement.textContent;
                        currentTrackArtist.textContent = artistNameElement.textContent;
                        currentTrackImage.src = imageElement.src;
                        
                        console.log('楽曲情報を設定:', {
                            name: trackNameElement.textContent,
                            artist: artistNameElement.textContent,
                            image: imageElement.src
                        });
                    } else {
                        console.warn('楽曲情報の要素が見つかりませんでした');
                    }
                    
                    showPlaybackControl();
                    break;
                }
            }
        }

        async function apiRequest(url) {
            // トークンが無い場合はログイン画面に戻す
            if (!accessToken) {
                console.warn('No access token available');
                mainView.classList.add('hidden');
                loginView.classList.remove('hidden');
                renderMessage("ログインが必要です。");
                return null;
            }
            
            try {
                const response = await fetch(url, { headers: { 'Authorization': `Bearer ${accessToken}` } });
                
                if (response.status === 401) {
                    console.warn('Token expired or invalid');
                    accessToken = null;
                    mainView.classList.add('hidden');
                    loginView.classList.remove('hidden');
                    renderMessage("認証が切れました。再度ログインしてください。");
                    return null;
                }
                
                if (response.status === 403) {
                    console.warn('Insufficient permissions');
                    renderMessage("このデータにアクセスする権限がありません。");
                    return null;
                }
                
                if (!response.ok) {
                    const errorText = await response.text();
                    console.error(`API request failed: ${response.status} ${response.statusText}`, errorText);
                    renderMessage(`データの取得に失敗しました (${response.status})`);
                    return null;
                }
                
                return await response.json();
            } catch (error) {
                console.error('API Request Error:', error);
                if (error.name === 'TypeError' && error.message.includes('Failed to fetch')) {
                    renderMessage("ネットワークエラーが発生しました。接続を確認してください。");
                } else {
                    renderMessage("データの取得中にエラーが発生しました。");
                }
                return null;
            }
        }
    </script>
