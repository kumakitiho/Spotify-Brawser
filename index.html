<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Spotify Stats</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #121212;
        }
        .bg-spotify-green { background-color: #1DB954; }
        .text-spotify-green { color: #1DB954; }
        .bg-spotify-dark { background-color: #121212; }
        .bg-spotify-light-dark { background-color: #181818; }
        .bg-spotify-gray { background-color: #282828; }
        .text-spotify-light-gray { color: #b3b3b3; }
        .filter-btn { transition: background-color 0.2s ease-in-out, color 0.2s ease-in-out; }
        .type-filter-btn.active { background-color: #1DB954; color: #121212; }
        .period-filter-btn.active, .year-filter-btn.active { 
            background-color: #fff !important; 
            color: #121212 !important; 
        }
        .period-filter-btn:not(.active), .year-filter-btn:not(.active) { 
            background-color: #282828 !important; 
            color: #ffffff !important; 
        }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #1DB954; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 2rem auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* レスポンシブ対応 - アーティスト写真クラウド */
        @media (max-width: 768px) {
            #artist-view-toggle {
                flex-direction: column;
                gap: 0.5rem;
            }
            .view-toggle-btn {
                font-size: 0.7rem;
                padding: 0.4rem 0.8rem;
                white-space: nowrap;
            }
            .view-toggle-btn svg {
                display: none;
            }
            #artist-cloud {
                min-height: 45rem; /* 縦長ダイヤモンド配置により高く */
                padding: 1rem;
            }
        }
        
        @media (max-width: 480px) {
            #artist-cloud {
                min-height: 40rem; /* スマホでも縦長を確保 */
                padding: 0.5rem;
            }
        }
        
        /* アーティスト写真クラウド - 動的グラデーションとネオンエフェクト */
        #artist-cloud {
            background: linear-gradient(-45deg, #121212, #1a1a2e, #16213e, #0f3460, #1DB954);
            background-size: 400% 400%;
            animation: dynamicGradient 15s ease infinite;
            position: relative;
            overflow: hidden;
        }
        
        #artist-cloud::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(29, 185, 84, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(30, 215, 96, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 40% 80%, rgba(29, 185, 84, 0.05) 0%, transparent 50%);
            animation: pulseLight 8s ease-in-out infinite alternate;
        }
        
        @keyframes dynamicGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        @keyframes pulseLight {
            0% { opacity: 0.3; }
            100% { opacity: 0.7; }
        }
        
        /* アーティスト写真のネオンエフェクト */
        .artist-photo {
            position: relative;
            filter: drop-shadow(0 0 20px rgba(29, 185, 84, 0.3));
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .artist-photo::before {
            content: '';
            position: absolute;
            top: -3px;
            left: -3px;
            right: -3px;
            bottom: -3px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #1DB954, #1ed760, #1fdf64, #1DB954);
            z-index: -1;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        
        .artist-photo:hover {
            filter: drop-shadow(0 0 30px rgba(29, 185, 84, 0.6)) 
                    drop-shadow(0 0 60px rgba(29, 185, 84, 0.4));
            transform: scale(1.1);
        }
        
        .artist-photo:hover::before {
            opacity: 0.8;
            animation: rotateGlow 2s linear infinite;
        }
        
        @keyframes rotateGlow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* 人気度別のエフェクト */
        .artist-rank-1 { 
            filter: drop-shadow(0 0 25px rgba(255, 215, 0, 0.4)) 
                    drop-shadow(0 0 50px rgba(29, 185, 84, 0.3)); 
        }
        .artist-rank-2 { 
            filter: drop-shadow(0 0 20px rgba(192, 192, 192, 0.4)) 
                    drop-shadow(0 0 40px rgba(29, 185, 84, 0.3)); 
        }
        .artist-rank-3 { 
            filter: drop-shadow(0 0 18px rgba(205, 127, 50, 0.4)) 
                    drop-shadow(0 0 35px rgba(29, 185, 84, 0.3)); 
        }
        
        /* 色滲み出しエフェクト */
        .artist-photo:hover {
            box-shadow: 0 0 0 0 rgba(29, 185, 84, 0.7);
            animation: colorBleed 1.5s infinite;
        }
        
        /* ホバー時にツールチップを最前面に */
        .group:hover {
            z-index: 9998 !important;
        }
        
        @keyframes colorBleed {
            0% {
                box-shadow: 0 0 0 0 rgba(29, 185, 84, 0.7);
            }
            70% {
                box-shadow: 0 0 0 30px rgba(29, 185, 84, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(29, 185, 84, 0);
            }
        }

        .insight-shell {
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background:
                radial-gradient(circle at top right, rgba(29, 185, 84, 0.26), transparent 28%),
                linear-gradient(135deg, rgba(24, 24, 24, 0.96), rgba(18, 18, 18, 0.98));
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.32);
        }

        .insight-shell::before {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background:
                linear-gradient(120deg, rgba(255, 255, 255, 0.08), transparent 36%),
                radial-gradient(circle at bottom left, rgba(32, 211, 104, 0.16), transparent 30%);
        }

        .insight-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            border-radius: 9999px;
            padding: 0.35rem 0.75rem;
            background: rgba(255, 255, 255, 0.08);
            color: #d1d5db;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
        }

        .insight-card {
            position: relative;
            min-height: 100%;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(14px);
        }

        .insight-card::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            border-radius: inherit;
            background: linear-gradient(160deg, rgba(255, 255, 255, 0.06), transparent 45%);
        }

        .insight-breakdown-track {
            overflow: hidden;
            border-radius: 9999px;
            background: rgba(255, 255, 255, 0.08);
        }

        .insight-breakdown-fill {
            border-radius: 9999px;
            background: linear-gradient(90deg, #1DB954, #46e38f);
        }

        .insight-share-btn {
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.05);
            transition: transform 0.2s ease, background-color 0.2s ease, border-color 0.2s ease;
        }

        .insight-share-btn:hover {
            transform: translateY(-1px);
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(29, 185, 84, 0.4);
        }

        .compare-card {
            min-width: 0;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(10px);
        }

        .compare-pill {
            display: inline-flex;
            align-items: center;
            border-radius: 9999px;
            padding: 0.2rem 0.6rem;
            background: rgba(29, 185, 84, 0.14);
            color: #86efac;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.08em;
        }

        .compare-list-item + .compare-list-item {
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .profile-record-shell {
            position: relative;
            display: grid;
            width: 64px;
            height: 64px;
            flex-shrink: 0;
            place-items: center;
            border-radius: 9999px;
            background: #282828;
            isolation: isolate;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .profile-record-shell::before,
        .profile-record-shell::after {
            content: '';
            position: absolute;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .profile-record-shell::before {
            inset: -6px;
            border-radius: inherit;
            background: conic-gradient(from 0deg, #1DB954, rgba(255, 255, 255, 0.86), #282828, #1DB954);
            filter: drop-shadow(0 0 14px rgba(29, 185, 84, 0.36));
            z-index: -1;
        }

        .profile-record-shell::after {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.86);
            border-radius: inherit;
            background: #121212;
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.35);
            z-index: 2;
        }

        .profile-record-shell.playback-active {
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.32);
        }

        .profile-record-shell.playback-active::before,
        .profile-record-shell.playback-active::after {
            opacity: 1;
        }

        .profile-record-shell.is-playing #user-avatar {
            animation: spinRecord 4.8s linear infinite;
        }

        .profile-record-shell.is-paused #user-avatar {
            filter: saturate(0.8) brightness(0.78);
        }

        #user-avatar {
            position: relative;
            z-index: 1;
            display: block;
            width: 58px;
            height: 58px;
            border-radius: 9999px;
            object-fit: cover;
            transform-origin: center;
        }

        .profile-now-playing-dot {
            position: absolute;
            right: -2px;
            bottom: -2px;
            width: 15px;
            height: 15px;
            border: 2px solid #121212;
            border-radius: 9999px;
            background: #1DB954;
            opacity: 0;
            transform: scale(0.76);
            z-index: 3;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .profile-record-shell.playback-active .profile-now-playing-dot {
            opacity: 1;
            transform: scale(1);
        }

        @keyframes spinRecord {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @media (prefers-reduced-motion: reduce) {
            .profile-record-shell.is-playing #user-avatar {
                animation: none;
            }
        }

        .track-row {
            cursor: pointer;
            min-height: 4rem;
            outline: none;
            transform: translateZ(0);
            transition: background-color 0.16s ease, box-shadow 0.16s ease, transform 0.16s ease;
        }

        .track-row:focus-visible {
            box-shadow: 0 0 0 2px rgba(29, 185, 84, 0.85);
        }

        .track-row:active,
        .track-row.is-activating {
            background-color: rgba(40, 40, 40, 0.96);
            box-shadow: inset 0 0 0 1px rgba(29, 185, 84, 0.45);
            transform: scale(0.995);
        }

        .track-row:focus-visible.is-activating {
            box-shadow: 0 0 0 2px rgba(29, 185, 84, 0.85), inset 0 0 0 1px rgba(29, 185, 84, 0.45);
        }

        .track-row .play-btn {
            min-width: 44px;
            min-height: 44px;
        }

        .track-row.is-activating .play-btn {
            background: #1DB954;
            color: #121212;
            animation: playIntentPulse 0.72s ease-in-out infinite alternate;
        }

        @keyframes playIntentPulse {
            from { box-shadow: 0 0 0 0 rgba(29, 185, 84, 0.28); }
            to { box-shadow: 0 0 0 8px rgba(29, 185, 84, 0); }
        }

        @media (prefers-reduced-motion: reduce) {
            .track-row.is-activating .play-btn {
                animation: none;
            }
        }
    </style>
</head>
<body class="bg-spotify-dark text-white">

    <div id="app-container" class="p-4 md:p-8 max-w-4xl mx-auto">
        <div id="login-view" class="text-center py-20">
            <h1 class="text-4xl md:text-6xl font-bold mb-4">あなたのSpotify統計</h1>
            <p class="text-spotify-light-gray mb-8">あなたの再生履歴とランキングを、まとめて見てみよう。</p>
            <div class="mx-auto mb-8 max-w-2xl text-left text-sm text-spotify-light-gray space-y-3">
                <p>トップ楽曲、トップアーティスト、プレイリスト作成のためにSpotifyの閲覧・プレイリスト権限を使います。</p>
                <p>ブラウザ内でのフル再生にはSpotify Premiumが必要です。Premiumでない場合も統計表示と30秒プレビューは利用できます。</p>
            </div>
            <button id="login-button" class="bg-spotify-green text-black font-bold py-3 px-8 rounded-full text-lg hover:scale-105 transition-transform">
                Spotifyでログイン
            </button>
        </div>
        <div id="main-view" class="hidden">
            <header class="sticky top-0 z-40 -mx-4 mb-8 flex items-center justify-between border-b border-white/10 bg-spotify-dark px-4 py-3 backdrop-blur-md md:-mx-8 md:px-8">
                <h1 class="min-w-0 text-3xl font-bold">My Stats</h1>
                <div id="user-profile" class="flex min-w-0 items-center gap-3">
                    <span id="user-name" class="hidden max-w-[12rem] truncate sm:inline"></span>
                    <div id="profile-record-shell" class="profile-record-shell" title="プロフィール">
                        <img id="user-avatar" src="https://placehold.co/40x40/282828/FFFFFF?text=U" alt="ユーザーアイコン">
                        <span class="profile-now-playing-dot" aria-hidden="true"></span>
                    </div>
                </div>
            </header>
            <main>
                <div class="flex gap-4 mb-6">
                    <button class="type-filter-btn filter-btn active bg-spotify-gray text-white font-bold py-2 px-4 rounded-full text-sm" data-type="tracks">トップ楽曲</button>
                    <button class="type-filter-btn filter-btn bg-spotify-gray text-white font-bold py-2 px-4 rounded-full text-sm" data-type="artists">トップアーティスト</button>
                </div>
                <div class="flex flex-wrap gap-3 mb-8">
                    <button class="period-filter-btn filter-btn bg-spotify-gray text-white font-semibold py-1 px-3 rounded-md text-xs" data-range="medium_term">過去6ヶ月</button>
                    <button class="period-filter-btn filter-btn bg-spotify-gray text-white font-semibold py-1 px-3 rounded-md text-xs" data-range="short_term">最近4週間</button>
                    <button class="period-filter-btn filter-btn active bg-white text-black font-semibold py-1 px-3 rounded-md text-xs" data-range="long_term">全期間</button>
                    <span class="text-spotify-light-gray self-center mx-2">|</span>
                    <div id="year-filter-group" class="flex flex-wrap gap-3"></div>
                </div>
                <p id="year-estimate-note" class="hidden -mt-5 mb-8 text-xs text-spotify-light-gray">
                    年別表示はSpotify APIの長期トップデータとリリース年から再構成した推定です。
                </p>

                <section id="insights-panel" class="mb-8 hidden">
                    <div class="insight-shell rounded-[2rem] p-5 sm:p-6">
                        <div class="relative z-10 flex flex-col gap-5">
                            <div class="flex flex-col gap-4 lg:flex-row lg:items-start lg:justify-between">
                                <div class="max-w-2xl">
                                    <div id="insights-kicker" class="insight-chip mb-3">LISTENING DNA</div>
                                    <h2 id="insights-title" class="text-2xl sm:text-3xl font-bold leading-tight"></h2>
                                    <p id="insights-description" class="mt-3 text-sm sm:text-base text-spotify-light-gray leading-relaxed"></p>
                                </div>
                                <div class="flex flex-wrap gap-2">
                                    <button id="create-playlist-btn" class="insight-share-btn rounded-full px-4 py-2 text-sm font-semibold text-white self-start hidden" type="button">
                                        プレイリスト化
                                    </button>
                                    <button id="share-summary-btn" class="insight-share-btn rounded-full px-4 py-2 text-sm font-semibold text-white self-start" type="button">
                                        結果をコピー
                                    </button>
                                </div>
                            </div>
                            <div id="insights-highlights" class="grid gap-3 sm:grid-cols-3"></div>
                            <div id="insights-breakdown" class="rounded-3xl bg-black/20 p-4 sm:p-5"></div>
                        </div>
                    </div>
                </section>

                <section id="comparison-panel" class="mb-8 hidden">
                    <div class="rounded-[2rem] border border-white/10 bg-white/[0.03] p-5 sm:p-6 overflow-hidden">
                        <div class="flex flex-col gap-3 mb-5 lg:flex-row lg:items-start lg:justify-between">
                            <div class="max-w-2xl">
                                <div class="compare-pill mb-3">PERIOD COMPARE</div>
                                <h2 id="comparison-title" class="text-xl sm:text-2xl font-bold text-white"></h2>
                                <p id="comparison-description" class="mt-2 text-sm text-spotify-light-gray leading-relaxed"></p>
                            </div>
                        </div>
                        <div id="comparison-grid" class="grid gap-3 min-w-0 lg:grid-cols-3"></div>
                    </div>
                </section>
                
                <!-- アーティスト表示切り替え（アーティスト選択時のみ表示） -->
                <div id="artist-view-toggle" class="flex gap-2 mb-6" style="display: none;">
                    <button id="artist-list-view" class="view-toggle-btn bg-spotify-green text-black font-semibold py-2 px-4 rounded-full text-sm transition-all hover:scale-105">
                        <svg class="w-4 h-4 inline mr-1" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M3 4a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 16a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1z"/>
                        </svg>
                        リスト表示
                    </button>
                    <button id="artist-cloud-view" class="view-toggle-btn bg-spotify-gray text-white font-semibold py-2 px-4 rounded-full text-sm transition-all hover:scale-105">
                        <svg class="w-4 h-4 inline mr-1" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M4 3a2 2 0 100 4h12a2 2 0 100-4H4zM4 9a2 2 0 100 4h12a2 2 0 100-4H4zM4 15a2 2 0 100 4h12a2 2 0 100-4H4z"/>
                        </svg>
                        イメージクラウド
                    </button>
                    <button id="artist-genre-view" class="view-toggle-btn bg-spotify-gray text-white font-semibold py-2 px-4 rounded-full text-sm transition-all hover:scale-105">
                        <svg class="w-4 h-4 inline mr-1" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M7 3a1 1 0 000 2h6a1 1 0 100-2H7zM4 7a1 1 0 011-1h10a1 1 0 110 2H5a1 1 0 01-1-1zM2 11a2 2 0 012-2h12a2 2 0 012 2v4a2 2 0 01-2 2H4a2 2 0 01-2-2v-4z"/>
                        </svg>
                        ジャンルクラウド
                    </button>
                </div>
                
                <div id="ranking-list"></div>
                <div id="artist-cloud" class="relative w-full min-h-96 rounded-lg p-2 sm:p-8" style="display: none;"></div>
                <div id="genre-cloud" class="relative w-full min-h-96 rounded-lg p-2 sm:p-8" style="display: none;"></div>
            </main>
            
            <!-- 再生コントロールバー -->
            <div id="playback-control" class="fixed bottom-0 left-0 right-0 bg-black bg-opacity-95 backdrop-blur-sm border-t border-gray-700 p-2 sm:p-4 hidden z-50">
                <div class="max-w-6xl mx-auto">
                    <!-- メイン行: 楽曲情報 + コントロールボタン -->
                    <div class="flex items-center justify-between gap-2 sm:gap-4 mb-2 sm:mb-0">
                        <div class="flex items-center flex-1 min-w-0">
                            <img id="current-track-image" src="" class="w-10 h-10 sm:w-12 sm:h-12 rounded-md mr-2 sm:mr-4 flex-shrink-0" alt="現在の楽曲">
                            <div class="min-w-0 flex-1">
                                <div id="current-track-name" class="font-semibold truncate text-white text-sm sm:text-base">楽曲名</div>
                                <div id="current-track-artist" class="text-xs sm:text-sm text-spotify-light-gray truncate">アーティスト名</div>
                            </div>
                        </div>
                        
                        <div class="flex items-center space-x-1 sm:space-x-2 flex-shrink-0">
                            <button id="prev-btn" class="p-1.5 sm:p-2 rounded-full text-white hover:text-spotify-green hover:scale-110 transition-all disabled:opacity-50 disabled:cursor-not-allowed" title="前の曲">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" class="sm:w-5 sm:h-5">
                                    <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
                                </svg>
                            </button>
                            <button id="play-pause-btn" class="p-1.5 sm:p-2 rounded-full bg-white text-black hover:scale-110 transition-transform">
                                <svg id="pause-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" class="sm:w-6 sm:h-6">
                                    <path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"/>
                                </svg>
                                <svg id="play-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" class="hidden sm:w-6 sm:h-6">
                                    <path d="M8 5v14l11-7z"/>
                                </svg>
                            </button>
                            <button id="next-btn" class="p-1.5 sm:p-2 rounded-full text-white hover:text-spotify-green hover:scale-110 transition-all disabled:opacity-50 disabled:cursor-not-allowed" title="次の曲">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" class="sm:w-5 sm:h-5">
                                    <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
                                </svg>
                            </button>

                        <!-- デスクトップ用プログレスバー -->

        // --- PKCE Helper Functions ---
        const generateRandomString = (length) => {
            const possible = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            const values = crypto.getRandomValues(new Uint8Array(length));
            return values.reduce((acc, x) => acc + possible[x % possible.length], "");
        };

        const sha256 = async (plain) => {
            const encoder = new TextEncoder();
            const data = encoder.encode(plain);
            return window.crypto.subtle.digest('SHA-256', data);
        };

        const base64encode = (input) => {
            return btoa(String.fromCharCode(...new Uint8Array(input)))
                .replace(/=/g, '')
                .replace(/\+/g, '-')
                .replace(/\//g, '_');
        };

        // --- �F�؃t���[ ---
        loginButton.addEventListener('click', async () => {
            const codeVerifier = generateRandomString(64);
            window.localStorage.setItem('code_verifier', codeVerifier);

            const hashed = await sha256(codeVerifier);
            const codeChallenge = base64encode(hashed);

            const params = new URLSearchParams({
                client_id: CLIENT_ID,
                response_type: 'code',
                redirect_uri: REDIRECT_URI,
                scope: SCOPES,
                code_challenge_method: 'S256',
                code_challenge: codeChallenge,
            });
            window.location.href = `${AUTH_URL}?${params.toString()}`;
        });

        // ������ �f�o�b�O������ ������
        const getToken = async (code) => {
            const codeVerifier = localStorage.getItem('code_verifier');
            
            try {
                const response = await fetch(TOKEN_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        client_id: CLIENT_ID,
                        grant_type: 'authorization_code',
                        code: code,
                        redirect_uri: REDIRECT_URI,
                        code_verifier: codeVerifier,
                    }),
                });

                if (!response.ok) {
                    // �G���[���X�|���X�̓��e���R���\�[���ɕ\��
                    const errorData = await response.json();
                    console.error('--- Spotify API Error ---');
                    console.error('Status:', response.status);
                    console.error('Error Body:', errorData);
                    console.error('-------------------------');
                    return null;
                }

                const data = await response.json();
                return data.access_token;

            } catch (error) {
                console.error('--- Network Error ---');
                console.error('Failed to fetch token:', error);
                console.error('---------------------');
                return null;
            }
        };

        // --- ���������� ---
        window.addEventListener('load', async () => {

            if (code) {

                window.history.replaceState({}, document.title, url);
                
                accessToken = await getToken(code);
                if (accessToken) {
                    initializeApp();
                } else {

            }
        });

        // --- �A�v���P�[�V�����̃��C������ ---

        // --- Spotify Web Playback SDK初期化 ---
        async function initializeSpotifyPlayer() {
            console.log('Spotify Web Playback SDKを初期化中...');

            if (window.Spotify) {

            }
        }
        
        function initializePlayer() {
            console.log('プレイヤーを作成中...');
            player = new Spotify.Player({
                name: 'Music App Player',
                getOAuthToken: cb => { cb(accessToken); },
                volume: 0.5
            });

            // エラーハンドリング
            player.addListener('initialization_error', ({ message }) => {
                console.error('初期化エラー:', message);
            });

            player.addListener('authentication_error', ({ message }) => {
                console.error('認証エラー:', message);
            });

            player.addListener('account_error', ({ message }) => {
                console.error('アカウントエラー (プレミアム必須):', message);
            });

            player.addListener('playback_error', ({ message }) => {
                console.error('再生エラー:', message);
            });

            // プレイヤー準備完了
            player.addListener('ready', ({ device_id }) => {
                console.log('🎵 プレイヤー準備完了! Device ID:', device_id);
                deviceId = device_id;
            });

            player.addListener('not_ready', ({ device_id }) => {
                console.log('プレイヤーが利用できません Device ID:', device_id);
            });

            // 再生状態の変更を監視
            player.addListener('player_state_changed', state => {
                console.log('🔄 player_state_changed - 全状態:', state);
                
                if (!state) {
                    console.log('⚠️ state is null - hiding playback control');
                    hidePlaybackControl();
                    return;
                }

                const {
                    track_window,
                    position,
                    duration,
                    paused
                } = state;

                // current_trackは track_window.current_track にある
                const current_track = track_window?.current_track;

                console.log('🔄 player_state_changed - 楽曲情報:', {
                    hasTrackWindow: !!track_window,
                    current_track: current_track,
                    name: current_track?.name,
                    artists: current_track?.artists?.map(a => a.name).join(', '),
                    uri: current_track?.uri,
                    paused: paused
                });

                if (current_track) {
                    updatePlaybackControl({
                        track: current_track,
                        position,
                        duration,
                        paused
                    });
                } else {
                    console.warn('⚠️ current_track is undefined in player_state_changed');
                    resetProfilePlaybackBadge();
                    hidePlaybackControl();
                    return;
                }

                isPlaying = !paused;
                updatePlayPauseButton();
                
                // リアルタイム更新の管理
                if (isPlaying) {
                    startProgressUpdate();
                } else {
                    stopProgressUpdate();
                }
            });

            // プレイヤーに接続
            player.connect().then(success => {
                if (success) {
                    console.log('✅ Spotify Playerに正常に接続しました!');
                    setupPlaybackControls();
                } else {
                    console.error('❌ Spotify Playerへの接続に失敗しました');
                }
            });
        }

        function average(values) {
            if (!values.length) return 0;
            return values.reduce((total, value) => total + value, 0) / values.length;

        function getTopEntries(entryMap, limit = 4) {

        function getTypeLabel(type) {

        function getComparisonConfig(rangeInfo) {
            if (rangeInfo.isYearMode) return null;

            if (rangeInfo.range === 'short_term') {
                return {

        function getComparableId(item, type) {
            if (!item) return null;
            return type === 'artists' ? item.id : item.uri;
        }

        function getComparableSubtitle(item, type) {
            if (!item) return '';
            return type === 'artists'
                ? `${item.genres?.slice(0, 2).join(', ') || 'genre unknown'}`
                : item.artists.map((artist) => artist.name).join(', ');
        }

        function createComparisonListMarkup(title, accent, items, emptyMessage) {
            return `
                <article class="compare-card rounded-3xl p-4 w-full min-w-0">
                    <div class="flex items-center justify-between gap-3 mb-3">
                        <h3 class="text-sm font-bold text-white">${title}</h3>
                        <span class="text-xs font-semibold ${accent}">${items.length}件</span>
                    </div>
                    <div>
                        ${items.length ? items.map((item) => `
                            <div class="compare-list-item py-2.5">
                                <div class="flex items-start justify-between gap-3 min-w-0">
                                    <div class="min-w-0">
                                        <div class="text-sm font-semibold text-white leading-snug break-words">${item.name}</div>
                                        <div class="text-xs text-spotify-light-gray mt-1 break-words">${item.subtitle}</div>
                                    </div>
                                    <div class="text-xs text-spotify-light-gray whitespace-nowrap flex-shrink-0">${item.meta}</div>
                                </div>
                            </div>
                        `).join('') : `<div class="py-3 text-sm text-spotify-light-gray">${emptyMessage}</div>`}
                    </div>
                </article>
            `;
        }

        function buildComparisonModel(currentItems, baselineItems, type, rangeInfo) {
            const config = getComparisonConfig(rangeInfo);
            if (!config || !currentItems?.length || !baselineItems?.length) return null;

            const baselineRanks = new Map();
            baselineItems.forEach((item, index) => {
                const id = getComparableId(item, type);
                if (id) baselineRanks.set(id, index + 1);
            });

            const currentRanks = new Map();
            currentItems.forEach((item, index) => {
                const id = getComparableId(item, type);
                if (id) currentRanks.set(id, index + 1);
            });

            const rising = currentItems
                .map((item, index) => {
                    const id = getComparableId(item, type);
                    const baselineRank = baselineRanks.get(id);
                    if (!baselineRank) return null;
                    const movement = baselineRank - (index + 1);
                    if (movement <= 0) return null;
                    return {
                        name: item.name,
                        subtitle: getComparableSubtitle(item, type),
                        meta: `+${movement}`,
                        movement
                    };
                })
                .filter(Boolean)
                .sort((left, right) => right.movement - left.movement)
                .slice(0, 5);

            const newEntries = currentItems
                .filter((item) => !baselineRanks.has(getComparableId(item, type)))
                .slice(0, 5)
                .map((item, index) => ({
                    name: item.name,
                    subtitle: getComparableSubtitle(item, type),
                    meta: `now #${index + 1}`
                }));

            const missing = baselineItems
                .filter((item) => !currentRanks.has(getComparableId(item, type)))
                .slice(0, 5)
                .map((item, index) => ({
                    name: item.name,
                    subtitle: getComparableSubtitle(item, type),
                    meta: `prev #${index + 1}`
                }));

            return {
                title: `${getTypeLabel(type)}比較: ${config.title}`,
                description: config.description,
                html: [
                    createComparisonListMarkup('上昇', 'text-green-300', rising, '大きく順位を上げた項目はまだありません。'),
                    createComparisonListMarkup('新規', 'text-cyan-300', newEntries, '新しく入ってきた項目はありません。'),
                    createComparisonListMarkup('離脱', 'text-amber-300', missing, 'ベース期間から消えた項目はありません。')
                ].join('')
            };
        }

        function renderComparison(model) {
            if (!model) {
                hideComparison();
                return;
            }

            comparisonTitle.textContent = model.title;
            comparisonDescription.textContent = model.description;
            comparisonGrid.innerHTML = model.html;
            comparisonPanel.classList.remove('hidden');
        }

        function buildTrackInsights(tracks, rangeInfo) {
            if (!tracks?.length) return null;

            const currentYear = new Date().getFullYear();
            const releaseYears = tracks
                .map((track) => parseInt(track.album?.release_date?.slice(0, 4), 10))
                .filter((year) => !Number.isNaN(year));
            const popularityValues = tracks.map((track) => track.popularity || 0);
            const explicitRatio = Math.round((tracks.filter((track) => track.explicit).length / tracks.length) * 100);
            const recentRatio = releaseYears.length
                ? Math.round((releaseYears.filter((year) => year >= currentYear - 1).length / releaseYears.length) * 100)
                : 0;
            const avgPopularity = Math.round(average(popularityValues));

            const artistCounts = {};
            tracks.forEach((track) => {
                track.artists.forEach((artist) => {
                    artistCounts[artist.name] = (artistCounts[artist.name] || 0) + 1;
                });
            });

            const [topArtistName = '未集計', topArtistCount = 0] = getTopEntries(artistCounts, 1)[0] || [];
            const artistFocusRatio = Math.round((topArtistCount / tracks.length) * 100);

            const decadeCounts = {};
            releaseYears.forEach((year) => {
                const decadeLabel = `${Math.floor(year / 10) * 10}s`;
                decadeCounts[decadeLabel] = (decadeCounts[decadeLabel] || 0) + 1;
            });
            const topDecades = getTopEntries(decadeCounts, 4);

            let archetype = {
                title: 'カタログ探検家',
                description: '新旧の曲を横断しながら、広めに掘っていく聴き方です。'
            };

            if (recentRatio >= 55) {
                archetype = {
                    title: '新譜ハンター',
                    description: '最近リリースの曲へ素早く反応する、アップデート感度の高い聴き方です。'
                };
            } else if (artistFocusRatio >= 30) {
                archetype = {
                    title: '推し特化型',
                    description: '好きなアーティストを深く回す、熱量の高いリスナー像です。'
                };
            } else if (avgPopularity >= 78) {
                archetype = {

                const weight = artists.length - index;

                    uniqueGenres.add(genre);
                    weightedGenreCounts[genre] = (weightedGenreCounts[genre] || 0) + weight;
                });

            const topGenres = getTopEntries(weightedGenreCounts, 5);

        async function copySummaryToClipboard(text) {
            try {
                if (navigator.clipboard?.writeText) {
                    await navigator.clipboard.writeText(text);
                    return true;
                }

                const textArea = document.createElement('textarea');
                textArea.value = text;
                textArea.setAttribute('readonly', '');
                textArea.style.position = 'absolute';
                textArea.style.left = '-9999px';
                document.body.appendChild(textArea);
                textArea.select();
                const copied = document.execCommand('copy');
                document.body.removeChild(textArea);
                return copied;
            } catch (error) {
                console.error('コピー失敗:', error);
                return false;
            }
        }

        function chunkArray(items, size) {
            const chunks = [];
            for (let index = 0; index < items.length; index += size) {
                chunks.push(items.slice(index, index + size));
            }
            return chunks;
        }

            const playlistName = `Spotify Stats ${rangeInfo.label} ${dateLabel}`;

            return {
                name: playlistName,

            };

        async function handleCreatePlaylist() {
            const payload = buildPlaylistPayload();
            if (!payload || !currentUserProfileData?.id) return;

            createPlaylistBtn.disabled = true;
            resetPlaylistButtonLabel('作成中...');

            try {
                const playlist = await apiRequest(`https://api.spotify.com/v1/users/${currentUserProfileData.id}/playlists`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: payload.name,
                        description: payload.description,
                        public: false
                    }),
                    suppressUiError: true
                });

                if (!playlist?.id) {
                    throw new Error('playlist creation failed');
                }

                const chunks = chunkArray(payload.uris, 100);
                for (const uris of chunks) {
                    const addResult = await apiRequest(`https://api.spotify.com/v1/playlists/${playlist.id}/tracks`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ uris }),
                        suppressUiError: true
                    });

                    if (addResult === null) {
                        throw new Error('playlist track insertion failed');
                    }
                }

                resetPlaylistButtonLabel('作成しました');
                if (playlist.external_urls?.spotify) {
                    window.open(playlist.external_urls.spotify, '_blank');
                }
            } catch (error) {
                console.error('プレイリスト作成エラー:', error);
                resetPlaylistButtonLabel('作成失敗');
            } finally {
                clearTimeout(playlistButtonResetTimeout);
                playlistButtonResetTimeout = setTimeout(() => {
                    createPlaylistBtn.disabled = false;
                    resetPlaylistButtonLabel();
                }, 2200);
            }
        }

        async function fetchGenresForArtistIds(artistIds) {
            const missingIds = artistIds.filter((artistId) => artistId && !artistGenreCache.has(artistId));
            if (!missingIds.length) return;

            for (let index = 0; index < missingIds.length; index += 50) {
                const batchIds = missingIds.slice(index, index + 50);
                const response = await apiRequest(`https://api.spotify.com/v1/artists?ids=${batchIds.join(',')}`);
                (response?.artists || []).forEach((artist) => {
                    if (artist?.id) {
                        artistGenreCache.set(artist.id, artist.genres || []);
                    }
                });
            }
        }

        async function enrichArtistsWithGenres(artists) {
            const artistIds = artists.map((artist) => artist.id).filter(Boolean);
            await fetchGenresForArtistIds(artistIds);

            return artists.map((artist) => ({
                ...artist,
                genres: artist.genres?.length ? artist.genres : (artistGenreCache.get(artist.id) || [])
            }));
        }

        function updateCurrentPlaylist() {

            currentPlaylist = Array.from(playButtons).map(btn => ({

            });

        function findCurrentTrackIndex(trackUri) {
            const index = currentPlaylist.findIndex(track => track.uri === trackUri);
            currentTrackIndex = index;
            console.log('🎵 現在の楽曲インデックス:', { index, uri: trackUri });
            updateNavigationButtons();

        async function playNextTrack() {
            if (currentPlaylist.length === 0) {
                console.log('⚠️ プレイリストが空のため次曲再生できません');
                return;
            }

            const nextIndex = currentTrackIndex + 1;
            if (nextIndex >= currentPlaylist.length) {
                console.log('🔚 プレイリストの最後に達しました');
                return;
            }

            const nextTrack = currentPlaylist[nextIndex];
            console.log('⏭️ 次曲を再生:', {
                index: nextIndex,
                name: nextTrack.name,
                artist: nextTrack.artist
            });

            try {
                const didStartPlayback = await playTrackWithWebPlayback(nextTrack.uri);
                if (didStartPlayback) {
                    currentTrackIndex = nextIndex;
                    updateNavigationButtons();
                }
            } catch (error) {
                console.error('❌ 次曲再生エラー:', error);
            }
        }

        async function playPreviousTrack() {
            if (currentPlaylist.length === 0) {
                console.log('⚠️ プレイリストが空のため前曲再生できません');
                return;
            }

            const prevIndex = currentTrackIndex - 1;
            if (prevIndex < 0) {
                console.log('🔙 プレイリストの最初に達しました');
                return;
            }

            const prevTrack = currentPlaylist[prevIndex];
            console.log('⏮️ 前曲を再生:', {
                index: prevIndex,
                name: prevTrack.name,
                artist: prevTrack.artist
            });

            try {
                const didStartPlayback = await playTrackWithWebPlayback(prevTrack.uri);
                if (didStartPlayback) {
                    currentTrackIndex = prevIndex;
                    updateNavigationButtons();
                }
            } catch (error) {
                console.error('❌ 前曲再生エラー:', error);
            }
        }

        function updateNavigationButtons() {
            // 前の曲ボタンの状態更新
            if (currentTrackIndex <= 0 || currentPlaylist.length === 0) {
                prevBtn.disabled = true;
            } else {
                prevBtn.disabled = false;
            }

            // 次の曲ボタンの状態更新
            if (currentTrackIndex >= currentPlaylist.length - 1 || currentPlaylist.length === 0) {
                nextBtn.disabled = true;
            } else {
                nextBtn.disabled = false;
            }

            console.log('🎮 ナビゲーションボタン更新:', {
                currentIndex: currentTrackIndex,
                playlistLength: currentPlaylist.length,
                prevDisabled: prevBtn.disabled,
                nextDisabled: nextBtn.disabled
            });
        }

        function handleKeyboardShortcuts(event) {
            // 入力フィールドにフォーカスがある場合はショートカットを無効化
            const activeElement = document.activeElement;
            if (activeElement && (activeElement.tagName === 'INPUT' || activeElement.tagName === 'TEXTAREA')) {
                return;
            }

            switch (event.key) {
                case 'ArrowLeft':
                    event.preventDefault();
                    if (!prevBtn.disabled) {
                        playPreviousTrack();
                    }
                    break;
                case 'ArrowRight':
                    event.preventDefault();
                    if (!nextBtn.disabled) {
                        playNextTrack();
                    }
                    break;
                case ' ':
                case 'Spacebar':
                    event.preventDefault();
                    togglePlayback();
                    break;
                default:
                    break;
            }
        }

        let trackEndTimeout = null;
        
        function detectTrackEnd(position, duration, paused) {
            // デバッグ用詳細ログ
            const remainingTime = duration - position;
            const progressPercent = ((position / duration) * 100).toFixed(1);
            
            // 進行状況を定期的にログ（90%以上で詳細ログ）
            if (progressPercent >= 90) {
                console.log(`🎵 再生進行状況: ${progressPercent}% (残り ${Math.ceil(remainingTime / 1000)}秒)`, {
                    position: Math.floor(position / 1000),
                    duration: Math.floor(duration / 1000),
                    paused,
                    playlistLength: currentPlaylist.length,
                    currentIndex: currentTrackIndex
                });
            }
            
            // 既存のタイムアウトをクリア
            if (trackEndTimeout) {
                clearTimeout(trackEndTimeout);
                trackEndTimeout = null;
            }
            
            // 楽曲が終了に近づいているかチェック（残り5秒以下に変更）
            if (remainingTime <= 5000 && remainingTime > 0 && !paused) {
                console.log(`🚨 楽曲終了検出: 残り ${Math.ceil(remainingTime / 1000)}秒`, {
                    hasPlaylist: currentPlaylist.length > 0,
                    nextTrackExists: currentTrackIndex + 1 < currentPlaylist.length,
                    nextTrack: currentPlaylist[currentTrackIndex + 1]?.name
                });
                
                // 残り時間後に次曲再生をスケジュール
                trackEndTimeout = setTimeout(() => {
                    console.log('🎵 楽曲終了タイムアウト実行 - 次曲を再生します');
                    playNextTrack();
                }, remainingTime + 1000); // 余裕を持たせる
            }
        }

        // --- 年別ランキング推定 ---
        function estimateYearlyRanking(tracks, targetYear) {
            console.log(`📅 年別ランキング推定開始: ${targetYear}年`);
            
            const rankedTracks = tracks.map((track, index) => {
                // リリース年を取得
                const releaseDate = track.album?.release_date;
                if (!releaseDate) {
                    console.warn('⚠️ リリース日が不明:', track.name);
                    return { ...track, estimatedScore: 0, releaseYear: null };
                }
                
                const releaseYear = new Date(releaseDate).getFullYear();
                const yearDiff = Math.abs(targetYear - releaseYear);
                
                // 基本スコア（現在のランキング位置の逆数）
                let baseScore = 100 - index;
                
                // 年度による重み付け
                let yearWeight = 1.0;
                if (yearDiff === 0) {
                    yearWeight = YEAR_RANKING_WEIGHTS.SAME_YEAR;
                } else if (yearDiff === 1) {
                    yearWeight = YEAR_RANKING_WEIGHTS.ONE_YEAR_DIFF;
                } else if (yearDiff === 2) {
                    yearWeight = YEAR_RANKING_WEIGHTS.TWO_YEAR_DIFF;
                } else if (yearDiff === 3) {
                    yearWeight = YEAR_RANKING_WEIGHTS.THREE_YEAR_DIFF;
                } else if (yearDiff >= 5) {
                    yearWeight = YEAR_RANKING_WEIGHTS.OLD_TRACK;
                }
                
                // 人気度スコアも考慮（0-100）
                const popularityBonus = (track.popularity || 50) / 100;
                
                // 最終スコア計算
                const estimatedScore = baseScore * yearWeight * (1 + popularityBonus * 0.3);
                
                return {
                    ...track,
                    estimatedScore,
                    releaseYear,
                    yearDiff,
                    yearWeight,
                    originalRank: index + 1
                };
            });
            
            // スコア順でソート
            const sortedTracks = rankedTracks.sort((a, b) => b.estimatedScore - a.estimatedScore);
            
            // デバッグログ
            console.log(`🎯 ${targetYear}年推定ランキング (上位10曲):`, 
                sortedTracks.slice(0, 10).map((track, idx) => ({
                    rank: idx + 1,
                    name: track.name,
                    artist: track.artists?.[0]?.name,
                    releaseYear: track.releaseYear,
                    originalRank: track.originalRank,
                    score: Math.round(track.estimatedScore),
                    yearWeight: track.yearWeight
                }))
            );
            
            return sortedTracks;
        }

        // アーティストの年別ランキング推定（シンプル版）
        function estimateArtistYearlyRanking(artists, targetYear) {
            console.log(`📅 アーティスト年別ランキング推定開始: ${targetYear}年`);
            
            // アーティストの場合はよりシンプルなロジック
            // 人気度と活動期間を基準に判定
            const rankedArtists = artists.map((artist, index) => {
                let baseScore = 100 - index;
                
                // 人気度ボーナス
                const popularityBonus = (artist.popularity || 50) / 100;
                
                // 最近のアーティスト（2020年以降デビュー）にボーナス
                const genres = artist.genres || [];
                let trendBonus = 1.0;
                
                // ジャンルから時代性を推定（簡易版）
                if (targetYear >= 2020) {
                    const modernGenres = ['pop', 'hip hop', 'electronic', 'indie', 'alternative'];
                    const hasModernGenre = genres.some(genre => 
                        modernGenres.some(modern => genre.toLowerCase().includes(modern))
                    );
                    if (hasModernGenre) trendBonus = 1.3;
                }
                
                const estimatedScore = baseScore * (1 + popularityBonus * 0.4) * trendBonus;
                
                return {
                    ...artist,
                    estimatedScore,
                    originalRank: index + 1
                };
            });
            
            const sortedArtists = rankedArtists.sort((a, b) => b.estimatedScore - a.estimatedScore);
            
            console.log(`🎯 ${targetYear}年アーティスト推定ランキング (上位10組):`, 
                sortedArtists.slice(0, 10).map((artist, idx) => ({
                    rank: idx + 1,
                    name: artist.name,
                    originalRank: artist.originalRank,
                    score: Math.round(artist.estimatedScore)
                }))
            );
            
            return sortedArtists;
        }

        async function fetchComparisonItems(type, rangeInfo) {
            const config = getComparisonConfig(rangeInfo);
            if (!config) return null;

            const data = await apiRequest(`https://api.spotify.com/v1/me/top/${type}?time_range=${config.baselineRange}&limit=20`, {
                suppressUiError: true
            });
            if (!data?.items) return null;

            if (type === 'artists') {
                return enrichArtistsWithGenres(data.items);
            }

            return data.items;
        }

                `Top Songs of ${year}`,

                `${year}年 人気曲`,
                `マイトップソング ${year}`,
                `私の${year}年`
            ];
            
            for (const queryText of searchQueries) {
                const query = encodeURIComponent(queryText);
                console.log(`🔍 プレイリスト検索中: "${queryText}"`);
                const data = await apiRequest(`https://api.spotify.com/v1/search?q=${query}&type=playlist&limit=20`);
                
                if (data && data.playlists && data.playlists.items) {

        function generateCloudPositions(count, sizes = []) {
            const positions = [];
            const centerX = 50;
            const centerY = 50;
            const isMobile = window.innerWidth <= 768;
            const containerWidth = isMobile ? window.innerWidth : 800;
            
            // 重なり検出関数
            function isOverlapping(pos1, size1, pos2, size2) {
                const radius1 = (size1 / 2) / containerWidth * 100; // %単位の半径
                const radius2 = (size2 / 2) / containerWidth * 100;
                const distance = Math.sqrt(Math.pow(pos1.x - pos2.x, 2) + Math.pow(pos1.y - pos2.y, 2));
                return distance < (radius1 + radius2 + 1); // 1%のマージン追加
            }
            
            // 位置調整関数
            function adjustPosition(baseX, baseY, currentSize, existingPositions, maxAttempts = 20) {
                let bestPos = { x: baseX, y: baseY };
                let minOverlaps = Infinity;
                
                for (let attempt = 0; attempt < maxAttempts; attempt++) {
                    const angle = (Math.PI * 2 * attempt) / maxAttempts;
                    const adjustDistance = attempt * 0.5; // 徐々に距離を広げる
                    
                    const testX = baseX + Math.cos(angle) * adjustDistance;
                    const testY = baseY + Math.sin(angle) * adjustDistance;
                    
                    // 境界チェック
                    const margin = 3;
                    if (testX < margin || testX > 100 - margin || testY < margin || testY > 100 - margin) {
                        continue;
                    }
                    
                    // 重なり数をカウント
                    let overlaps = 0;
                    for (let j = 0; j < existingPositions.length; j++) {
                        if (isOverlapping({ x: testX, y: testY }, currentSize, existingPositions[j].pos, existingPositions[j].size)) {
                            overlaps++;
                        }
                    }
                    
                    if (overlaps < minOverlaps) {
                        minOverlaps = overlaps;
                        bestPos = { x: testX, y: testY };
                        if (overlaps === 0) break; // 重なりなしなら完了
                    }
                }
                
                return bestPos;
            }
            
            const placedPhotos = [];
            
            for (let i = 0; i < count; i++) {
                const currentSize = sizes[i] || 64;
                let x, y;
                
                if (i === 0) {
                    // 1位は中央
                    x = centerX;
                    y = centerY;
                } else {
                    // 理想的な同心円位置を計算
                    let ring, positionInRing, itemsInRing;
                    
                    if (i >= 1 && i <= 6) {
                        ring = 1; positionInRing = i - 1; itemsInRing = 6;
                    } else if (i >= 7 && i <= 18) {
                        ring = 2; positionInRing = i - 7; itemsInRing = 12;
                    } else if (i >= 19 && i <= 36) {
                        ring = 3; positionInRing = i - 19; itemsInRing = 18;
                    } else {
                        ring = 4 + Math.floor((i - 37) / 24);
                        positionInRing = (i - 37) % 24;
                        itemsInRing = 24;
                    }
                    
                    const angle = (2 * Math.PI * positionInRing) / itemsInRing - Math.PI / 2;
                    
                    // 重なりを防ぐ適切な半径計算
                    const avgPhotoSize = sizes.reduce((a, b) => a + b, 0) / sizes.length || 64;
                    const minRadius = (avgPhotoSize * 1.2) / containerWidth * 100; // 最小間隔
                    
                    const baseRadius = Math.max(minRadius, (isMobile ? 12 : 15) * ring);
                    const idealX = centerX + Math.cos(angle) * baseRadius;
                    const idealY = centerY + Math.sin(angle) * baseRadius;
                    
                    // 重なり回避調整
                    const adjustedPos = adjustPosition(idealX, idealY, currentSize, placedPhotos);
                    x = adjustedPos.x;
                    y = adjustedPos.y;
                }
                
                positions.push({ x, y });
                placedPhotos.push({ pos: { x, y }, size: currentSize });
            }
            
            console.log('🎯 重なり防止配置完了:', {
                count,
                overlaps: placedPhotos.length > 1 ? placedPhotos.filter((p1, i) => 
                    placedPhotos.some((p2, j) => i !== j && isOverlapping(p1.pos, p1.size, p2.pos, p2.size))
                ).length : 0
            });
            
            return positions;
        }
        
        // ジャンルクラウド専用の配置アルゴリズム
        function generateGenreCloudPositions(count) {
            const positions = [];
            const centerX = 50;
            const centerY = 50;
            
            for (let i = 0; i < count; i++) {
                let x, y;
                
                if (i === 0) {
                    // 最も人気のジャンルは中央
                    x = centerX;
                    y = centerY;
                } else {
                    // ランダム配置だが重なりを避ける
                    let attempts = 0;
                    do {
                        const angle = Math.random() * 2 * Math.PI;
                        const radius = Math.sqrt(Math.random()) * 35 + 10; // 10-45%の半径
                        
                        x = centerX + Math.cos(angle) * radius;
                        y = centerY + Math.sin(angle) * radius;
                        
                        // 境界チェック
                        x = Math.max(10, Math.min(90, x));
                        y = Math.max(10, Math.min(90, y));
                        
                        attempts++;
                    } while (attempts < 50 && positions.some(pos => 
                        Math.sqrt(Math.pow(pos.x - x, 2) + Math.pow(pos.y - y, 2)) < 8
                    ));
                }
                
                positions.push({ x, y });
            }
            
            console.log('🎨 ジャンルクラウド配置完了:', positions.slice(0, 5));
            return positions;
        }

        function addPlayButtonListeners() {
            if (playButtonListenersBound) return;

            const setTrackRowPending = (trackRow, isPending, activationToken = null) => {
                if (isPending) {
                    clearTimeout(trackRow.feedbackTimeout);
                    trackRow.feedbackToken = (trackRow.feedbackToken || 0) + 1;
                    trackRow.classList.add('is-activating');
                    trackRow.setAttribute('aria-busy', 'true');
                    return trackRow.feedbackToken;
                }

                if (activationToken !== trackRow.feedbackToken) {
                    return null;
                }

                clearTimeout(trackRow.feedbackTimeout);
                trackRow.feedbackTimeout = setTimeout(() => {
                    if (activationToken !== trackRow.feedbackToken) {
                        return;
                    }

                    trackRow.classList.remove('is-activating');
                    trackRow.removeAttribute('aria-busy');
                    trackRow.feedbackToken = null;
                }, 220);
                return null;
            };

            const handleTrackActivation = async (e) => {
                const trackRow = e.target.closest('.track-row');
                if (!trackRow || !rankingList.contains(trackRow)) return;

                const buttonElement = e.target.closest('.play-btn') || trackRow.querySelector('.play-btn');
                if (!buttonElement) return;

                e.preventDefault();
                e.stopPropagation();
                const activationToken = setTrackRowPending(trackRow, true);

                const previewUrl = buttonElement.dataset.previewUrl;
                const trackUri = buttonElement.dataset.trackUri;
                const trackInfo = {
                    name: trackRow.querySelector('.font-semibold.truncate')?.textContent || '不明な楽曲',
                    artist: trackRow.querySelector('.track-artist')?.textContent || '不明なアーティスト',
                    image: trackRow.querySelector('img')?.src || ''
                };

                try {
                    if (trackUri && accessToken) {
                        console.log('Web Playback SDKでフル再生:', trackUri);

                        updateCurrentPlaylist();

                        const didStartSpotifyPlayback = await playTrackWithWebPlayback(trackUri, trackInfo);
                        if (didStartSpotifyPlayback) {
                            findCurrentTrackIndex(trackUri);
                            if (!audioPlayer.paused) {
                                audioPlayer.pause();
                                currentTrackUrl = null;
                            }
                            return;
                        }
                    }

                    if (previewUrl) {
                        console.log('プレビュー再生中:', previewUrl);
                        if (audioPlayer.paused || currentTrackUrl !== previewUrl) {
                            audioPlayer.src = previewUrl;
                            try {
                                await audioPlayer.play();
                                currentTrackUrl = previewUrl;
                                console.log('プレビュー再生開始');
                                return;
                            } catch (error) {
                                console.error('プレビュー再生エラー:', error);
                            }
                        } else {
                            console.log('同じプレビューを再生中です');
                            return;
                        }
                    }

                    if (trackUri) {
                        const spotifyUrl = trackUri.replace('spotify:track:', 'https://open.spotify.com/track/');
                        console.log('デバイス未準備、Spotifyで開く:', spotifyUrl);
                        window.location.href = spotifyUrl;
                        return;
                    }
                    alert('この楽曲の情報が取得できませんでした。');
                } finally {
                    setTrackRowPending(trackRow, false, activationToken);
                }
            };

            rankingList.addEventListener('click', handleTrackActivation);
            rankingList.addEventListener('keydown', async (e) => {
                if (e.key !== 'Enter' && e.key !== ' ') return;
                await handleTrackActivation(e);

            playButtonListenersBound = true;

        // --- Web Playback SDK再生機能 ---
        async function playTrackWithWebPlayback(trackUri, trackInfo = null) {
            console.log('🎵 playTrackWithWebPlayback呼び出し:', { trackUri, trackInfo });

            if (!accessToken) {
                console.error('アクセストークンが利用できません');
                return false;
            }

            try {
                const playUrl = deviceId
                    ? `https://api.spotify.com/v1/me/player/play?device_id=${deviceId}`
                    : 'https://api.spotify.com/v1/me/player/play';
                const response = await fetch(playUrl, {
                    method: 'PUT',
                    body: JSON.stringify({ uris: [trackUri] }),
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${accessToken}`
                    },
                });

                if (response.ok) {
                    console.log('✅ Web Playback SDKで再生開始');
                    showPlaybackControl();
                    console.log('⏱ 楽曲再生開始 - プレイヤーからの情報を待機中');
                    return true;
                }

                if (response.status === 404) {
                    console.warn('デバイスが見つかりません。プレビューまたは外部リンクへフォールバックします。');
                } else {
                    const error = await response.text();
                    console.error('再生リクエストエラー:', response.status, error);
                }
            } catch (error) {
                console.error('Web Playback再生エラー:', error);
            }

            return false;
        }

        async function handleSeek(event) {
            if (!player || !accessToken || !deviceId) return;
            
            try {
                const state = await player.getCurrentState();
                if (!state || !state.duration) return;
                
                // クリック位置から再生位置を計算
                const rect = seekBar.getBoundingClientRect();
                const clickX = event.clientX - rect.left;
                const percentage = clickX / rect.width;
                const seekPosition = Math.floor(state.duration * percentage);
                
                console.log(`シーク: ${percentage * 100}% (${formatTime(seekPosition)})`);
                
                // Spotify APIでシーク
                const response = await fetch(`https://api.spotify.com/v1/me/player/seek?position_ms=${seekPosition}&device_id=${deviceId}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`
                    }
                });
                
                if (response.ok) {
                    console.log('✅ シーク成功');
                } else {
                    console.error('❌ シーク失敗:', response.status);

            } catch (error) {

        function formatTime(ms) {
            const seconds = Math.floor(ms / 1000);
            const minutes = Math.floor(seconds / 60);
            const remainingSeconds = seconds % 60;
            return `${minutes}:${remainingSeconds.toString().padStart(2, '0')}`;
        }
        
        function startProgressUpdate() {
            stopProgressUpdate(); // 既存のインターバルをクリア
            
            progressInterval = setInterval(async () => {
                if (!player) return;
                
                try {
                    const state = await player.getCurrentState();
                    if (state && state.track_window?.current_track) {
                        const current_track = state.track_window.current_track;
                        const currentTrackUri = current_track.uri;
                        
                        // 楽曲が変更されたかチェック
                        if (lastTrackUri !== currentTrackUri) {
                            console.log('🔄 楽曲変更を検出:', {
                                old: lastTrackUri,
                                new: currentTrackUri,
                                track: current_track.name,
                                artists: current_track.artists?.map(a => a.name).join(', ')
                            });
                            
                            // 楽曲情報を更新
                            updatePlaybackControl({
                                track: current_track,
                                position: state.position,
                                duration: state.duration,
                                paused: state.paused
                            });
                            
                            lastTrackUri = currentTrackUri;
                        }
                        
                        // プログレスバーと時間を更新（デスクトップ＋モバイル）
                        if (state.position && state.duration) {
                            const formattedCurrentTime = formatTime(state.position);
                            const formattedTotalTime = formatTime(state.duration);
                            const progress = (state.position / state.duration) * 100;
                            const progressWidth = `${Math.min(progress, 100)}%`;
                            
                            // デスクトップ用更新
                            currentTime.textContent = formattedCurrentTime;
                            totalTime.textContent = formattedTotalTime;
                            progressBar.style.width = progressWidth;
                            
                            // モバイル用更新
                            currentTimeMobile.textContent = formattedCurrentTime;
                            totalTimeMobile.textContent = formattedTotalTime;
                            progressBarMobile.style.width = progressWidth;
                        }
                    }
                } catch (error) {
                    console.error('プログレス更新エラー:', error);
                }
            }, PROGRESS_UPDATE_INTERVAL);
        }
        
        function stopProgressUpdate() {
            if (progressInterval) {
                clearInterval(progressInterval);
                progressInterval = null;
            }
            // 楽曲変更検出をリセット
            lastTrackUri = null;
        }
        
        function setInitialTrackInfo(trackUri) {
            // 現在表示されている楽曲リストから情報を取得
            const playButtons = document.querySelectorAll('.play-btn');
            for (const button of playButtons) {
                if (button.dataset.trackUri === trackUri) {
                    // 親要素（楽曲の行全体）を取得
                    const trackRow = button.closest('.track-row');
                    if (!trackRow) continue;
                    
                    // 楽曲情報を取得
                    const trackNameElement = trackRow.querySelector('.font-semibold.truncate');
                    const artistNameElement = trackRow.querySelector('.track-artist');
                    const imageElement = trackRow.querySelector('img');
                    
                    if (trackNameElement && artistNameElement && imageElement) {
                        // コントロールバーに情報を設定
                        currentTrackName.textContent = trackNameElement.textContent;
                        currentTrackArtist.textContent = artistNameElement.textContent;
                        currentTrackImage.src = imageElement.src;
                        
                        console.log('楽曲情報を設定:', {
                            name: trackNameElement.textContent,
                            artist: artistNameElement.textContent,
                            image: imageElement.src
                        });
                    } else {
                        console.warn('楽曲情報の要素が見つかりませんでした');
                    }
                    
                    showPlaybackControl();
                    break;
                }
            }
        }

        async function apiRequest(url, options = {}) {
            // トークンが無い場合はログイン画面に戻す
            if (!accessToken) {
                console.warn('No access token available');
                mainView.classList.add('hidden');
                loginView.classList.remove('hidden');
                renderMessage("ログインが必要です。");
                return null;
            }
            
            try {
                const { suppressUiError = false, headers = {}, ...fetchOptions } = options;
                const response = await fetch(url, {
                    ...fetchOptions,
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        ...headers
                    }
                });
                
                if (response.status === 401) {
                    console.warn('Token expired or invalid');
                    accessToken = null;
                    mainView.classList.add('hidden');
                    loginView.classList.remove('hidden');
                    if (!suppressUiError) {
                        renderMessage("認証が切れました。再度ログインしてください。");
                    }
                    return null;
                }
                
                if (response.status === 403) {
                    console.warn('Insufficient permissions');
                    if (!suppressUiError) {
                        renderMessage("このデータにアクセスする権限がありません。");
                    }
                    return null;
                }
                
                if (!response.ok) {
                    const errorText = await response.text();
                    console.error(`API request failed: ${response.status} ${response.statusText}`, errorText);
                    if (!suppressUiError) {
                        renderMessage(`データの取得に失敗しました (${response.status})`);
                    }
                    return null;
                }

                if (response.status === 204) {
                    return { success: true };
                }

                const contentType = response.headers.get('content-type') || '';
                if (contentType.includes('application/json')) {
                    return await response.json();
                }

                return await response.text();
            } catch (error) {
                console.error('API Request Error:', error);
                if (!options.suppressUiError) {
                    if (error.name === 'TypeError' && error.message.includes('Failed to fetch')) {
                        renderMessage("ネットワークエラーが発生しました。接続を確認してください。");
                    } else {
                        renderMessage("データの取得中にエラーが発生しました。");
                    }
                }
                return null;
            }
        }
        
        // --- キーボードショートカット ---
        document.addEventListener('keydown', (e) => {
            // フォーカスが入力フィールドにある場合はスキップ
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
                return;
            }
            
            switch(e.key) {
                case 'ArrowLeft':
                    e.preventDefault();
                    if (!prevBtn.disabled) {
                        playPreviousTrack();
                    }
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    if (!nextBtn.disabled) {
                        playNextTrack();
                    }
                    break;
                case ' ':
                case 'Spacebar':
                    e.preventDefault();
                    togglePlayback();
                    break;
            }
        });
    </script>

</body>
</html>
